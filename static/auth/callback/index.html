<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ergon - Redirecting...</title>
    <script>
      var params = window.location.search;
      if (window.opener) {
        // Web popup flow: post the custom scheme URL back to the opener
        window.opener.postMessage(
          { url: "ergonwork://oauthredirect" + params },
          "*"
        );
        window.close();
      } else {
        // Native app via Chrome Custom Tab: redirect to custom scheme
        window.location.href = "ergonwork://oauthredirect" + params;
      }
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 40px">
      Redirecting to Ergon...
    </p>
  </body>
</html>
